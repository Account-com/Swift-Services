<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <style>
      body { font-family: Arial, sans-serif; background:#0f172a; color:#e5e7eb; margin:0; }
      .wrap { max-width: 860px; margin: 0 auto; padding: 32px 18px 56px; }
      h1 { font-size: 30px; margin-bottom: 8px; }
      h2 { margin-top: 28px; font-size: 20px; }
      p, li { line-height: 1.6; color:#cbd5e1; }
      a { color:#93c5fd; transition: color 180ms ease; }
      a:hover { color:#bfdbfe; }
      .meta { color:#94a3b8; font-size: 14px; margin-bottom: 22px; }
      .card { background: rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:24px; animation: legalCardIn 320ms cubic-bezier(0.16, 1, 0.3, 1) both; transition: transform 180ms cubic-bezier(0.16, 1, 0.3, 1), border-color 180ms ease, box-shadow 180ms ease; }
      .card:hover { transform: translateY(-2px); border-color: rgba(147,197,253,0.22); box-shadow: 0 18px 42px rgba(0,0,0,0.18); }
      @keyframes legalCardIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
      @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; transition-duration: 0.01ms !important; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
<h1>Contact</h1>
<div class="meta">Support for the soft-launch platform</div>
<p>Email: <a href="mailto:{{ support_email }}">{{ support_email }}</a></p>
<p>Support hours: {{ support_hours }}</p>
<p>Launch status: Under development / soft launch</p>
<p>This contact page is intended for account support, payment issues, and platform questions.</p>
</div>
    </div>
  </body>
</html>
